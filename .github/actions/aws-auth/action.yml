name: Authenticate to AWS
description: Use GitHub OIDC when configured and temporary Learner Lab credentials otherwise

inputs:
  aws-region:
    description: AWS region
    required: true
  role-arn:
    description: GitHub OIDC role ARN
    required: false
    default: ""
  access-key-id:
    description: Temporary AWS access key ID
    required: false
    default: ""
  secret-access-key:
    description: Temporary AWS secret access key
    required: false
    default: ""
  session-token:
    description: Temporary AWS session token
    required: false
    default: ""
  role-session-name:
    description: AWS role session name
    required: false
    default: github-actions

runs:
  using: composite
  steps:
    - name: Authenticate with GitHub OIDC
      if: ${{ inputs.role-arn != '' }}
      uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.role-arn }}
        role-session-name: ${{ inputs.role-session-name }}
        role-duration-seconds: 3600
        mask-aws-account-id: true
        unset-current-credentials: true

    - name: Authenticate with Learner Lab credentials
      if: ${{ inputs.role-arn == '' }}
      uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100
      with:
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.access-key-id }}
        aws-secret-access-key: ${{ inputs.secret-access-key }}
        aws-session-token: ${{ inputs.session-token }}
        mask-aws-account-id: true
        unset-current-credentials: true
