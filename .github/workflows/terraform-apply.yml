name: Terraform apply or destroy

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Terraform stack
        required: true
        type: choice
        options:
          - shared
          - staging
          - production
      operation:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
      confirmation:
        description: Enter APPLY or DESTROY
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ inputs.stack }}
  cancel-in-progress: false

jobs:
  execute:
    name: ${{ inputs.operation }} ${{ inputs.stack }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.stack == 'production' && 'production' || 'staging' }}
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_state_bucket_name: ${{ vars.TF_BACKEND_BUCKET }}
      TF_VAR_container_image: ${{ vars.INITIAL_IMAGE }}
      TF_VAR_task_execution_role_arn: ${{ vars.TASK_EXECUTION_ROLE_ARN }}
      TF_VAR_task_role_arn: ${{ vars.TASK_ROLE_ARN }}
      TF_VAR_create_task_execution_role: ${{ vars.CREATE_TASK_EXECUTION_ROLE || 'false' }}
      TF_VAR_enable_github_oidc: ${{ vars.ENABLE_GITHUB_OIDC || 'false' }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_approved_image_parameter: ${{ vars.APPROVED_IMAGE_PARAMETER }}

    steps:
      - name: Validate confirmation
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          expected="$(printf '%s' "$OPERATION" | tr '[:lower:]' '[:upper:]')"
          test "$CONFIRMATION" = "$expected"

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Authenticate to AWS
        uses: ./.github/actions/aws-auth
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-arn: ${{ vars.TERRAFORM_ROLE_ARN }}
          access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          role-session-name: terraform-${{ inputs.operation }}-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: 1.14.9

      - name: Initialize backend
        working-directory: infra/live/${{ inputs.stack }}
        env:
          BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
          BACKEND_REGION: ${{ vars.AWS_REGION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${BACKEND_BUCKET}" \
            -backend-config="key=goldenowl/${{ inputs.stack }}/terraform.tfstate" \
            -backend-config="region=${BACKEND_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Create execution plan
        working-directory: infra/live/${{ inputs.stack }}
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
        run: |
          if [[ "$OPERATION" == "destroy" ]]; then
            terraform plan -destroy -input=false -out=tfplan
          else
            terraform plan -input=false -out=tfplan
          fi

      - name: Apply execution plan
        working-directory: infra/live/${{ inputs.stack }}
        run: terraform apply -input=false -auto-approve tfplan
